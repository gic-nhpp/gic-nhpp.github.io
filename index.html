<html style="">
<head>
	<meta charset="UTF-8">
	<title>GIC for NHPP</title>
	<!--<link rel="shortcut icon" href="https://gic-nhpp.github.io/limit/img/you.ico" />

	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
-->
	<!-- 载入layui CSS -->
	<link rel="stylesheet" href="https://gic-nhpp.github.io/limit/core/layui/css/layui.css"  media="all">
	<link rel="stylesheet" href="https://gic-nhpp.github.io/limit/css/waveletShrinkageEstimationTool.css"  media="all">
</head>

<body id="body" style="position:relative;">
	<ul class="layui-nav" lay-filter="">
		<li class="layui-nav-item layui-this"><a href="https://gic-nhpp.github.io">GIC for NHPP</a></li>
		
	</ul>

	<!-- 登录页 -->
	<div class="login_shade_div">
		<!-- 登录内容 -->
		<div class="layadmin-user-login layadmin-user-display-show" id="LAY-user-login" style="display: none;">
			<div class="layadmin-user-login-main">
				<div class="layadmin-user-login-box layadmin-user-login-header">
					
					<h2 style="font-size: 25px;">GIC for NHPP</h2>
					<!--<p>Author：Wu JingChi</p>-->
				</div>
				<div class="layadmin-user-login-box layadmin-user-login-body layui-form" lay-filter="formTest">
					<div class="layui-form-item" style="margin-bottom: 0px;">
						<label class="layui-form-label">Dataset :</label>
						<button type="button" class="layui-btn" id="upload">
							<i class="layui-icon">&#xe67c;</i>Upload
						</button>
						<label id="fileName" class="layui-form-label" style="float:right;text-align:left;width:177px;color:#999; padding-right: 35px;">
						</label>
					</div>
					<div class="layui-form-item" style="margin-left: 170px;">
						<p style="font-size: 12px; color: #999;">Click <a download="DS1toDS10.zip" style="color: #1E90FF;" href="https://gic-nhpp.github.io/DS1toDS10.zip">here</a> to download the DS1~DS10 datasets used in our paper.</p>
						<p style="font-size: 12px; color: #999;">You may then upload any one of these datasets, such as “DS1.xlsx”, to our tool.</p>
					</div>

					<!--
					<div class="layui-form-item">
						<div class="layui-form-item">
							<label class="layui-form-label">Data Type :</label>
							<div class="layui-input-block">
								<input type="radio" lay-filter="dataType" name="dataType" value="time" title="Time-domain Data" checked/>
								<input type="radio" lay-filter="dataType" name="dataType" value="group" title="Grouped Data"/>
							</div>
						</div>
					</div>
					-->

					<div class="layui-form-item">
						<div class="layui-form-item" style="margin-bottom: 0px;">
							<label class="layui-form-label">Observation Point :</label>
							<div class="layui-input-block">
								<input type="radio" lay-filter="obserPoint2" name="obserPoint" value="2" title="20%" checked/>
								<input type="radio" lay-filter="obserPoint5" name="obserPoint" value="5" title="50%"/>
								<input type="radio" lay-filter="obserPoint8" name="obserPoint" value="8" title="80%"/>
								<input type="radio" lay-filter="obserPoint10" name="obserPoint" value="10" title="100%"/>
							</div>
						</div>
						<div class="layui-form-item" style="margin-bottom: 0px;margin-left: 170px;">
							<p id="obserPointMsg" style="font-size: 12px;color: #999;">
							Regard the first 20% of the whole data as early testing phase, and use the remaining 80% data for verification.
							</p>
						</div>

					</div>

					<div class="layui-form-item">
						<label class="layui-form-label">Estimation Method :</label>
						<div class="layui-input-block">
							<input type="radio" name="estMethod" value="OLS" title="OLS (Ordinary Least Squares)" checked/>
							<input type="radio" name="estMethod" value="RLS" title="RLS (Root Least Squares)"/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">Model Name :</label>
						<div class="layui-input-block">
							<input type="radio" name="modelName" value="Exp" title="Exp" checked/>
							<input type="radio" name="modelName" value="Gamma" title="Gamma"/>
							<input type="radio" name="modelName" value="Pareto" title="Pareto"/>
							<input type="radio" name="modelName" value="TruncNormal" title="TruncNormal"/>
							<input type="radio" name="modelName" value="TruncLogist" title="TruncLogist"/>
							<input type="radio" name="modelName" value="LogLogist" title="LogLogist"/>
							<input type="radio" name="modelName" value="TruncEVMax" title="TruncEVMax"/>
							<input type="radio" name="modelName" value="LogEVMax" title="LogEVMax"/>
							<input type="radio" name="modelName" value="TruncEVMin" title="TruncEVMin"/>
							<input type="radio" name="modelName" value="LogEVMin" title="LogEVMin"/>
						</div>
					</div>

					<div class="layui-form-item">
						<div class="layui-input-block" id="res" style="margin-left: 155px;">
						<button id="Estimate" class="layui-btn" lay-submit lay-filter="Estimate" >Estimate</button>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>

<!-- 载入layui JS -->
<script src="https://gic-nhpp.github.io/limit/core/layui/layui.js"></script>
<!-- 载入jquery -->
<script src="https://gic-nhpp.github.io/jquery/2.1.4/jquery.min.js"></script>
<!-- 载入jquery cookie -->
<script src="https://gic-nhpp.github.io/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
<!-- 载入md5插件 -->
<script src="https://gic-nhpp.github.io/limit/core/md5.js"></script>
<!-- 载入LimitControl控制模块 -->
<script src="https://gic-nhpp.github.io/limit/core/LimitControl.js"></script>
<!-- 载入页面脚本 -->
<script src="https://gic-nhpp.github.io/limit/js/waveletShrinkageEstimationTool.js"></script>
<!-- 模块组入口 -->
<script>
	//载入layer模块
	layui.use('layer', function(){});
    layui.use('element', function(){});
	//设置网站域名
	LimitControl.setHostName("https://gic.61jieyou.com/index.php/");
	//设置Limit框架目录路径
	LimitControl.setStaticHost("https://gic-nhpp.github.io/");
</script>
</html>
